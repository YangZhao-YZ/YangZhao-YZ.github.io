bio: |
  I am a second-year Ph.D. student in Mechanical Engineering at Northeastern University, advised by Prof. [Sze Zheng Yong](https://coe.northeastern.edu/people/yong-sze-zheng/). My research lies at the intersection of control theory and machine learning, with a focus on data-driven control with constraint satisfaction, as well as safe planning and control under uncertainty.

  I received my M.S. in Mechanical Engineering from the University of Illinois Urbana-Champaign (UIUC), where I was advised by Prof. [Naira Hovakimyan](https://mechse.illinois.edu/people/profile/nhovakim). Prior to that, I earned my B.Eng. in Electronic and Information Engineering from The Hong Kong Polytechnic University (PolyU).

